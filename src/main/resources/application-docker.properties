spring.application.name=${SPRING_APPLICATION_NAME:credit}

# DataSource configuration - For Docker deployments
# Default to PostgreSQL, but can be overridden with environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://credit-db:5432/credit_db}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:credit_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:credit_password}

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
